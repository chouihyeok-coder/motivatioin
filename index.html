<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f7f7f5">
  <title>One Kind Word</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#" aria-label="One Kind Word home"><span class="brand-mark">ONE</span><span>Kind Word</span></a>
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Switch to dark mode">
      <span class="sun" aria-hidden="true">☀</span><span class="moon" aria-hidden="true">●</span>
    </button>
  </header>
  <main>
    <section class="intro" aria-labelledby="page-title">
      <p class="eyebrow">A place to share what is on your mind</p>
      <h1 id="page-title">Your words could be<br>someone's strength today.</h1>
      <p>It does not have to be profound. Share a thought, a feeling, or a little encouragement.</p>
    </section>
    <section class="feed-wrap" aria-label="Community feed">
      <form class="composer" id="post-form">
        <div class="avatar avatar-me" aria-hidden="true">ME</div>
        <div class="composer-body">
          <label class="sr-only" for="post-text">Post content</label>
          <textarea id="post-text" maxlength="300" rows="3" placeholder="What's on your mind?"></textarea>
          <div class="image-preview" id="image-preview" hidden>
            <img id="preview-image" alt="Selected image preview">
            <button class="remove-image" id="remove-image" type="button" aria-label="Remove selected image">×</button>
          </div>
          <div class="composer-actions">
            <label class="image-picker" for="image-input"><span aria-hidden="true">＋</span> Add image</label>
            <input class="sr-only" id="image-input" type="file" accept="image/jpeg,image/png,image/webp,image/gif">
            <span class="character-count"><b id="character-count">0</b>/300</span>
            <button class="submit-button" type="submit">Share</button>
          </div>
        </div>
      </form>
      <div class="feed-heading"><h2>Community stories</h2><span id="post-count">0 posts</span></div>
      <div class="feed" id="feed" aria-live="polite"></div>
      <div class="empty-state" id="empty-state" hidden><p>No stories yet.</p><span>Be the first to share something.</span></div>
    </section>
  </main>
  <template id="post-template">
    <article class="post">
      <div class="post-avatar avatar" aria-hidden="true"></div>
      <div class="post-content">
        <header class="post-header">
          <div><strong class="post-author"></strong><time class="post-time"></time></div>
          <button class="delete-button" type="button" data-action="delete" aria-label="Delete post">Delete</button>
        </header>
        <p class="post-text"></p>
        <img class="post-image" alt="Image shared with this post" hidden>
        <div class="reactions" aria-label="Emoji reactions"></div>
      </div>
    </article>
  </template>
  <div id="toast" role="status" aria-live="polite"></div>
  <script src="./main.js"></script>
</body>
</html>
