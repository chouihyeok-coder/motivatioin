<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#f2eee5"><title>한 줄의 힘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<header><a class="brand" href="#"><b>一</b> 한 줄의 힘</a><button class="primary open-form">＋ 문장 기록하기</button></header>
<main>
  <section class="hero">
    <div><p class="label">WORDS TO LIVE BY</p><h1>오늘의 마음에<br><em>한 문장</em>을 심다.</h1><p class="intro">나를 움직인 격언, 오래 기억하고 싶은 대사,<br>힘이 되어준 모든 문장을 이곳에 모아보세요.</p></div>
    <article class="featured"><div class="featured-head"><span>오늘의 문장</span><button id="shuffle" aria-label="다른 문장">↻</button></div><blockquote id="featured-text"></blockquote><p id="featured-source"></p><i>“</i></article>
  </section>
  <section class="collection">
    <div class="section-head"><div><p class="label">MY COLLECTION</p><h2>나의 문장들 <span id="count">0</span></h2></div><label class="search">⌕ <input id="search" type="search" placeholder="문장이나 출처 검색"></label></div>
    <nav id="filters"><button class="active" data-filter="전체">전체</button><button data-filter="동기부여">동기부여</button><button data-filter="격언">격언</button><button data-filter="영화">영화</button><button data-filter="드라마">드라마</button><button data-filter="나의 생각">나의 생각</button><button data-filter="즐겨찾기">♡ 즐겨찾기</button></nav>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" hidden><strong>✦</strong><h3>아직 문장이 없어요</h3><p>마음에 남은 첫 문장을 기록해보세요.</p><button class="primary open-form">문장 기록하기</button></div>
  </section>
</main>
<footer><span>당신의 하루를 바꾸는 한 줄을 기록하세요.</span><b>한 줄의 힘</b></footer>
<dialog id="dialog"><form id="form"><div class="form-head"><div><p class="label">NEW SENTENCE</p><h2 id="form-title">새 문장 기록하기</h2></div><button id="close" type="button" aria-label="닫기">×</button></div><input id="edit-id" type="hidden"><label>문장 <em>*</em><textarea id="text" maxlength="300" placeholder="마음에 남은 문장을 적어주세요." required></textarea><small><span id="chars">0</span>/300</small></label><div class="row"><label>분류<select id="category"><option>동기부여</option><option>격언</option><option>영화</option><option>드라마</option><option>나의 생각</option></select></label><label>출처<input id="source" maxlength="80" placeholder="인물, 작품명 등"></label></div><button class="primary submit">문장 저장하기</button></form></dialog>
<div id="toast" role="status"></div><script src="./main.js"></script>
</body></html>
